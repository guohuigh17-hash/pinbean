          <td style="padding:5px 10px">${count.toLocaleString()}</td>
          <td style="padding:5px 10px">${packs} 包</td>
          <td style="padding:5px 10px">${inKit ? '<span style="color:#2e7d32;font-weight:600">套装已有</span>' : '<span style="color:#e65100;font-weight:600">需购买</span>'}</td>
        </tr>`;
      }).join('');

      const win = window.open('', '_blank');
      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
        <title>MARD 拼豆图纸</title>
        <style>
          body { font-family: -apple-system, sans-serif; padding: 20px; color: #1a1a1a; }
          h1 { font-size: 20px; margin-bottom: 4px; }
          .sub { font-size: 13px; color: #888; margin-bottom: 20px; }
          img { max-width: 100%; border: 1px solid #e8e8e0; border-radius: 6px; margin-bottom: 24px; }
          table { width: 100%; border-collapse: collapse; font-size: 13px; }
          th { text-align: left; padding: 7px 10px; background: #f5f5f0; font-size: 11px; color: #888; border-bottom: 1px solid #ddd; }
          td { border-bottom: 1px solid #f0f0ec; }
          @media print { body { padding: 0; } }
        </style></head><body>
        <h1>MARD 拼豆图纸</h1>
        <div class="sub">图纸大小：${currentGridW}×${currentGridH} 格 · 共 ${(currentGridW*currentGridH).toLocaleString()} 颗 · ${sorted.length} 种颜色 · 套装：${KIT_TIERS[currentTierIndex].label}</div>
        <img src="${imgData}">
        <h2 style="font-size:15px;margin-bottom:12px">🛒 购物清单</h2>
        <table><thead><tr>
          <th>颜色</th><th>色号</th><th>中文名</th><th>需要颗数</th><th>建议包数</th><th>状态</th>
        </tr></thead><tbody>${rows}</tbody></table>
        <script>window.onload = function(){ window.print(); }<\/script>
      </body></html>`);
      win.document.close();
    }

    function buildShoppingData() {
      const kitNames = new Set();
      for (const s of KIT_TIERS[currentTierIndex].series)
        for (const n of SERIES[s]) kitNames.add(n);
      return Object.entries(currentColorCount)
        .sort((a, b) => b[1] - a[1])
        .map(([name, count]) => ({
          name, count,
          zh: COLOR_MAP[name].zh,
          packs: Math.ceil(count / 1000),
          inKit: kitNames.has(name)
        }));
    }

    function exportCSV() {
      const rows = buildShoppingData();
      const header = '色号,中文名,需要颗数,建议包数（约1000颗/包）,套装状态\n';
      const body = rows.map(r =>
        `${r.name},${r.zh},${r.count},${r.packs},${r.inKit ? '套装已有' : '需购买'}`
      ).join('\n');
      const bom = '\uFEFF'; // BOM for Excel compatibility
      triggerDownload(bom + header + body, 'mard-shopping-list.csv', 'text/csv');
    }

    function exportTXT() {
      const rows = buildShoppingData();
      const dateStr = new Date().toLocaleDateString('zh-CN');
      let txt = `MARD 拼豆购物清单\n生成日期：${dateStr}\n图纸：${currentGridW}×${currentGridH}格 · ${KIT_TIERS[currentTierIndex].label}\n\n`;
      txt += '色号       中文名          颗数      包数  状态\n';
      txt += '─'.repeat(54) + '\n';
      rows.forEach(r => {
        const status = r.inKit ? '套装已有' : '★需购买';
        txt += `${r.name.padEnd(10)} ${r.zh.padEnd(14)} ${String(r.count).padStart(6)} 颗  ${r.packs} 包  ${status}\n`;
      });
      const needBuy = rows.filter(r => !r.inKit);
      if (needBuy.length > 0) {
        txt += '\n─'.repeat(54) + '\n需额外购买的颜色：\n';
        needBuy.forEach(r => txt += `  ${r.name} ${r.zh} × ${r.count}颗（建议买 ${r.packs} 包）\n`);
      }
      triggerDownload(txt, 'mard-shopping-list.txt', 'text/plain');
    }

    function triggerDownload(content, filename, mime) {
      const blob = new Blob([content], { type: mime + ';charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.download = filename; a.href = url; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // ─── 图纸分享 ────────────────────────────────────────────────────────────────
    function encodePattern() {
      // RLE 压缩：扫描行优先，相邻相同颜色合并；65535 表示空格（主体模式）
      const flat = [];
      for (let y = 0; y < currentGridH; y++)
        for (let x = 0; x < currentGridW; x++)
          flat.push(currentGrid[y][x] ? COLOR_IDX[currentGrid[y][x].name] : 65535);

      const runs = [];
      let i = 0;
      while (i < flat.length) {
        let j = i + 1;
        while (j < flat.length && flat[j] === flat[i] && (j - i) < 65535) j++;
        runs.push([flat[i], j - i]);
        i = j;
      }

      const payload = {
        v: 1,
        w: currentGridW,
        h: currentGridH,
        bs: currentBoardSize,
        bx: currentBoardsX,
        by: currentBoardsY,
        ti: currentTierIndex,
        cs: currentCellSize,
        sl: currentShowLabels ? 1 : 0,
        rle: runs
      };

      const json = JSON.stringify(payload);
      // btoa 需要 latin1；先 encodeURIComponent 处理 unicode（虽然这里都是数字）
      const b64 = btoa(json).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      return '#mard:v1:' + b64;
    }

    function decodePattern(hash) {
      try {
        if (!hash.startsWith('#mard:v1:')) return false;
        const b64 = hash.slice(9).replace(/-/g, '+').replace(/_/g, '/');
        const json = atob(b64);
        const p = JSON.parse(json);
        if (p.v !== 1) return false;

        // 重建 grid
        const flat = [];
        for (const [idx, cnt] of p.rle)
          for (let k = 0; k < cnt; k++) flat.push(idx);

        if (flat.length !== p.w * p.h) return false;

        const grid = [];
        let pos = 0;
        for (let y = 0; y < p.h; y++) {
          const row = [];
          for (let x = 0; x < p.w; x++) {
            const idx = flat[pos++];
            row.push(idx === 65535 ? null : COLOR_MAP[COLOR_NAMES[idx]]);
          }
          grid.push(row);
        }

        // 恢复全局状态
        currentGrid      = grid;
        currentGridW     = p.w;
        currentGridH     = p.h;
        currentBoardSize = p.bs;
        currentBoardsX   = p.bx;
        currentBoardsY   = p.by;
        currentTierIndex = p.ti;
        currentCellSize  = p.cs;
        currentShowLabels= p.sl === 1;
        highlightedColor = null;

        // 重建 colorCount（跳过空格）
        const colorCount = {};
        for (let y = 0; y < p.h; y++)
          for (let x = 0; x < p.w; x++) {
            const cell = grid[y][x];
            if (!cell) continue;
            colorCount[cell.name] = (colorCount[cell.name] || 0) + 1;
          }
        currentColorCount = colorCount;

        // 恢复 UI 控件值
        document.getElementById('board-type').value = p.bs;
        document.getElementById('boards-x').value   = p.bx;
        document.getElementById('boards-y').value   = p.by;
        document.getElementById('kit-tier').value   = p.ti;
        document.getElementById('cell-size').value  = p.cs;
        document.getElementById('show-labels').checked = currentShowLabels;
        document.getElementById('pattern-w').value  = p.w;
        document.getElementById('pattern-h').value  = p.h;
        patternW = p.w; patternH = p.h;
        updateConfig();

        // 渲染
        renderGrid(grid, p.w, p.h, p.cs, currentShowLabels);
        renderStats(colorCount, p.w, p.h, p.bs, p.bx, p.by, p.ti);
        renderShoppingList(colorCount, p.ti);
        renderBoardOverview();
        renderIndividualBoards();
        document.getElementById('output-area').style.display = 'block';

        // 提示用户
        ppOffscreen = null; // 分享链接恢复时无需预处理
        document.getElementById('preprocess-panel').style.display = 'none';
        const uploadArea = document.getElementById('upload-area');
        uploadArea.innerHTML = `<p style="font-size:14px;color:#666;padding:1rem">📎 已从分享链接恢复图纸</p>
          <p style="font-size:12px;color:#aaa;margin-top:4px">点击重新选择图片</p>`;

        return true;
      } catch (e) {
        console.warn('decodePattern failed:', e);
        return false;
      }
    }

    function loadFromURL() {
      if (window.location.hash.startsWith('#mard:v1:')) {
        decodePattern(window.location.hash);
      }
    }

    // ─── 按钮事件 ────────────────────────────────────────────────────────────────
    // 导出下拉菜单开关
    document.getElementById('export-toggle-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('export-menu').classList.toggle('open');
    });
    document.addEventListener('click', () => {
      document.getElementById('export-menu').classList.remove('open');
    });

    function exportAndClose(fn) { fn(); document.getElementById('export-menu').classList.remove('open'); }
    document.getElementById('download-png-btn').addEventListener('click', () => exportAndClose(exportPNG));
    document.getElementById('export-pdf-btn').addEventListener('click', () => exportAndClose(exportPDF));
    document.getElementById('export-csv-btn').addEventListener('click', () => exportAndClose(exportCSV));
    document.getElementById('export-txt-btn').addEventListener('click', () => exportAndClose(exportTXT));

    document.getElementById('share-btn').addEventListener('click', () => {
      const hash = encodePattern();
      const url = window.location.href.split('#')[0] + hash;
      document.getElementById('share-url').value = url;
      document.getElementById('share-modal').classList.remove('hidden');
    });

    document.getElementById('share-close-btn').addEventListener('click', () => {
      document.getElementById('share-modal').classList.add('hidden');
    });

    document.getElementById('share-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('share-modal'))
        document.getElementById('share-modal').classList.add('hidden');
    });

    document.getElementById('share-copy-btn').addEventListener('click', () => {
      const urlBox = document.getElementById('share-url');
      navigator.clipboard.writeText(urlBox.value).then(() => {
        const btn = document.getElementById('share-copy-btn');
        const orig = btn.textContent;
        btn.textContent = '已复制！';
        setTimeout(() => btn.textContent = orig, 1500);
      }).catch(() => {
        urlBox.select();
        document.execCommand('copy');
      });
    });

    // ─── 镜像功能 ────────────────────────────────────────────────────────────────
    function applyMirror(transformFn) {
      currentGrid = transformFn(currentGrid, currentGridW, currentGridH);
      highlightedColor = null;
      document.querySelectorAll('.color-chip').forEach(el =>
        el.classList.remove('chip-active', 'chip-dim'));
      renderGrid(currentGrid, currentGridW, currentGridH, currentCellSize, currentShowLabels);
      renderBoardOverview();
      renderIndividualBoards();
    }

    document.getElementById('mirror-h-btn').addEventListener('click', () => {
      applyMirror((grid, GW, GH) =>
        grid.map(row => [...row].reverse())
      );
    });

    document.getElementById('mirror-v-btn').addEventListener('click', () => {
      applyMirror((grid, GW, GH) =>
        [...grid].reverse()
      );
    });

    // ─── 板子拼接预览（生成后自动调用）──────────────────────────────────────────
    function renderBoardOverview() {
      const GW = currentGridW, GH = currentGridH, CS = currentCellSize;
      const cols = currentBoardsX, rows = currentBoardsY, BS = currentBoardSize;
      const canvas = document.getElementById('board-overview-canvas');
      canvas.width = GW * CS; canvas.height = GH * CS;
      const ctx = canvas.getContext('2d');

      // 绘制格子
      for (let y = 0; y < GH; y++) {
        for (let x = 0; x < GW; x++) {
          const c = currentGrid[y][x];
          if (!c) { drawEmptyCell(ctx, x*CS, y*CS, CS); continue; }
          ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
          ctx.fillRect(x*CS, y*CS, CS, CS);
        }
      }
      // 细网格线
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= GW; i++) {
        ctx.beginPath(); ctx.moveTo(i*CS, 0); ctx.lineTo(i*CS, GH*CS); ctx.stroke();
      }
      for (let j = 0; j <= GH; j++) {
        ctx.beginPath(); ctx.moveTo(0, j*CS); ctx.lineTo(GW*CS, j*CS); ctx.stroke();
      }
      // 板子边界（红色粗线）
      ctx.strokeStyle = 'rgba(220,40,40,0.85)';
      ctx.lineWidth = Math.max(1.5, CS * 0.2);
      for (let r = 0; r <= rows; r++) {
        const yPx = r * BS * CS;
        ctx.beginPath(); ctx.moveTo(0, yPx); ctx.lineTo(GW*CS, yPx); ctx.stroke();
      }
      for (let c = 0; c <= cols; c++) {
        const xPx = c * BS * CS;
        ctx.beginPath(); ctx.moveTo(xPx, 0); ctx.lineTo(xPx, GH*CS); ctx.stroke();
      }
      // 每块板子编号圆圈
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const num = r * cols + c + 1;
          const x1  = c * BS * CS, y1 = r * BS * CS;
          const x2  = (c+1) * BS * CS, y2 = (r+1) * BS * CS;
          const cx  = (x1 + x2) / 2, cy = (y1 + y2) / 2;
          const rad = Math.max(10, Math.min(x2-x1, y2-y1) * 0.22);
          ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(220,40,40,0.9)'; ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${Math.max(9, rad)}px Arial,sans-serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(num.toString(), cx, cy);
        }
      }
    }

    function renderIndividualBoards() {
      const GW = currentGridW, GH = currentGridH, CS = currentCellSize;
      const cols = currentBoardsX, rows = currentBoardsY, BS = currentBoardSize;
      const showLabels = document.getElementById('show-labels').checked;
      const gridWrap  = document.getElementById('board-grid-wrap');
      const gridEl    = document.getElementById('board-grid');
      const labelEl   = document.getElementById('board-grid-label');

      labelEl.textContent = `单块板子图纸（共 ${rows * cols} 块，左上→右下顺序）`;
      gridEl.innerHTML = '';
      gridEl.style.gridTemplateColumns = `repeat(${Math.min(cols, 4)}, 1fr)`;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const num    = r * cols + c + 1;
          const startX = c * BS;
          const startY = r * BS;
          const endX   = Math.min(startX + BS, GW);
          const endY   = Math.min(startY + BS, GH);
          const bW     = endX - startX;
          const bH     = endY - startY;

          // 统计该板用色（跳过空格）
          const bColorCount = {};
          for (let y = startY; y < endY; y++)
            for (let x = startX; x < endX; x++) {
              const cell = currentGrid[y][x];
              if (!cell) continue;
              bColorCount[cell.name] = (bColorCount[cell.name] || 0) + 1;
            }
          const bColorNum = Object.keys(bColorCount).length;

          // 卡片
          const card = document.createElement('div');
          card.className = 'board-card';

          const header = document.createElement('div');
          header.className = 'board-card-header';
          header.innerHTML = `<span class="board-card-num">第 ${num} 块</span>
            <span class="board-card-sub">${r+1}行·${c+1}列 &nbsp;|&nbsp; ${bW}×${bH} 格 &nbsp;|&nbsp; ${bColorNum}色</span>`;

          const canvas = document.createElement('canvas');
          canvas.width  = bW * CS;
          canvas.height = bH * CS;
          const ctx = canvas.getContext('2d');

          // 绘制格子内容
          for (let y = startY; y < endY; y++) {
            for (let x = startX; x < endX; x++) {
              const clr = currentGrid[y][x];
              if (!clr) { drawEmptyCell(ctx, (x-startX)*CS, (y-startY)*CS, CS); continue; }
              ctx.fillStyle = `rgb(${clr.r},${clr.g},${clr.b})`;
              ctx.fillRect((x-startX)*CS, (y-startY)*CS, CS, CS);
            }
          }
          // 网格线
          ctx.strokeStyle = 'rgba(0,0,0,0.1)';
          ctx.lineWidth = 0.5;
          for (let i = 0; i <= bW; i++) {
            ctx.beginPath(); ctx.moveTo(i*CS, 0); ctx.lineTo(i*CS, bH*CS); ctx.stroke();
          }
          for (let j = 0; j <= bH; j++) {
            ctx.beginPath(); ctx.moveTo(0, j*CS); ctx.lineTo(bW*CS, j*CS); ctx.stroke();
          }
          // 色号标注
          if (showLabels && CS >= 9) {
            const fs = Math.max(4, Math.floor(CS * 0.42));
            ctx.font = `bold ${fs}px Arial,sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let y = startY; y < endY; y++) {
              for (let x = startX; x < endX; x++) {
                const clr = currentGrid[y][x];
                if (!clr) continue;
                const lum = 0.299*clr.r + 0.587*clr.g + 0.114*clr.b;
                ctx.fillStyle = lum > 148 ? 'rgba(0,0,0,0.62)' : 'rgba(255,255,255,0.82)';
                ctx.fillText(clr.name, (x-startX)*CS + CS/2, (y-startY)*CS + CS/2);
              }
            }
          }

          // 下载按钮
          const dlBtn = document.createElement('button');
          dlBtn.className = 'btn-dl-board';
          dlBtn.textContent = '下载';
          dlBtn.onclick = () => {
            const a = document.createElement('a');
            a.download = `mard-board-${num}.png`;
            a.href = canvas.toDataURL();
            a.click();
          };
          header.appendChild(dlBtn);

          // 该板用色色标
          const colorRow = document.createElement('div');
          colorRow.className = 'board-card-colors';
          const sorted = Object.entries(bColorCount).sort((a,b) => b[1]-a[1]);
          colorRow.innerHTML = sorted.map(([name, cnt]) => {
            const cl = COLOR_MAP[name];
            return `<div class="color-chip color-swatch-wrap">
              <div class="color-swatch" style="background:rgb(${cl.r},${cl.g},${cl.b})"></div>
              <span>${name}×${cnt}</span>
            </div>`;
          }).join('');

          card.appendChild(header);
          card.appendChild(canvas);
          card.appendChild(colorRow);
          gridEl.appendChild(card);
        }
      }
      gridWrap.style.display = 'block';
    }

    // 拖拽上传
    const uploadArea = document.getElementById('upload-area');
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.background = '#fafaf8'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.background = ''; });
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.style.background = '';
      const file = e.dataTransfer.files[0];
      if (file) {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('file-input').files = dt.files;
        document.getElementById('file-input').dispatchEvent(new Event('change'));
      }
    });

    // 页面加载时尝试从 URL hash 恢复图纸
    loadFromURL();
  </script>
</body>
</html>
