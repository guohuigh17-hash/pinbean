<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARD 拼豆图纸生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 2rem; }
    .container { max-width: 820px; margin: 0 auto; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 0.25rem; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 2rem; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e0; padding: 1.5rem; margin-bottom: 1rem; }
    .upload-area { border: 2px dashed #d0d0c8; border-radius: 10px; padding: 2.5rem; text-align: center; cursor: pointer; transition: background 0.15s; }
    .upload-area:hover { background: #fafaf8; }
    .upload-area svg { color: #aaa; margin: 0 auto 0.75rem; display: block; }
    .upload-area p { font-size: 14px; color: #888; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 1rem 0 0.75rem; }
    .control-group label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
    select { width: 100%; padding: 8px 10px; border: 1px solid #e0e0d8; border-radius: 8px; font-size: 14px; background: #fff; cursor: pointer; }
    .tier-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #e8f4ff; color: #0066cc; border: 1px solid #b3d9ff; margin-left: 6px; vertical-align: middle; }
    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
    .toggle-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; cursor: pointer; user-select: none; }
    .toggle-label input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #1a1a1a; }
    .label-hint { font-size: 11px; color: #aaa; }
    .buttons { display: flex; gap: 8px; margin-bottom: 0; }
    .btn { padding: 9px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid #e0e0d8; background: #fff; color: #1a1a1a; transition: background 0.15s; }
    .btn:hover { background: #f5f5f0; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { background: #1a1a1a; }
    .output-area { margin-top: 1.5rem; display: none; }
    .grid-canvas-wrap { overflow-x: auto; width: 100%; margin-bottom: 1rem; border-radius: 8px; border: 1px solid #e8e8e0; }
    #grid-canvas { image-rendering: pixelated; display: block; min-width: 100%; border-radius: 8px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 1rem; }
    .stat-card { background: #f5f5f0; border-radius: 8px; padding: 12px; }
    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-card .value { font-size: 20px; font-weight: 600; }
    .color-legend { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 6px; }
    .color-chip { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #555; background: #f5f5f0; padding: 4px 8px; border-radius: 20px; }
    .color-swatch { width: 13px; height: 13px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.12); flex-shrink: 0; }
    #hidden-canvas { display: none; }

    /* ── 配置区 ── */
    .cfg-label { display: block; font-size: 12px; color: #999; margin-bottom: 5px; font-weight: 500; }
    .config-module { background: #f9f9f7; border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid #eeeeea; }
    .module-title { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    .num-input { width: 100%; padding: 8px 10px; border: 1px solid #e0e0d8; border-radius: 8px; font-size: 14px; background: #fff; }

    .custom-row { display: flex; align-items: center; gap: 8px; }
    .custom-row label { font-size: 13px; color: #666; white-space: nowrap; }
    .custom-row .sep { font-size: 14px; color: #bbb; }
    .feedback-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .fb-item { background: #fff; border: 1px solid #eeeeea; border-radius: 8px; padding: 10px 6px; text-align: center; }
    .fb-label { font-size: 11px; color: #aaa; margin-bottom: 5px; }
    .fb-value { font-size: 17px; font-weight: 700; color: #1a1a1a; line-height: 1; }
    .fb-sub { font-size: 10px; color: #ccc; margin-top: 3px; }
    .warn { color: #e07000 !important; }

    /* ── 艺术风格按钮 ── */
    .style-btns { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
    .style-btn { padding: 8px 4px; border-radius: 8px; border: 1.5px solid #e0e0d8; background: #fff; cursor: pointer; text-align: center; transition: all 0.12s; }
    .style-btn:hover { border-color: #bbb; }
    .style-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
    .style-name { font-size: 13px; font-weight: 600; }
    .style-desc { font-size: 10px; color: #aaa; margin-top: 2px; line-height: 1.2; }
    .style-btn.active .style-desc { color: rgba(255,255,255,0.5); }

    /* ── 折叠区 ── */
    .collapsible-section { border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
    .collapsible-btn { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; background: #f9f9f7; border: none; cursor: pointer; font-size: 13px; color: #555; font-weight: 500; }
    .collapsible-btn:hover { background: #f2f2ef; }
    .collapsible-btn .caret { font-size: 11px; color: #bbb; transition: transform 0.15s; }
    .collapsible-btn.open .caret { transform: rotate(90deg); }
    .collapsible-body { display: none; padding: 0 12px 12px; background: #fff; }
    .collapsible-body.open { display: block; }

    /* ── 板子拼接预览 ── */
    .board-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e8e8e0; }
    .board-section-title { font-size: 15px; font-weight: 600; margin-bottom: 0.75rem; }
    .board-controls { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
    .board-controls .control-group { min-width: 160px; }
    .board-info { font-size: 13px; color: #666; padding: 8px 12px; background: #f5f5f0; border-radius: 8px; line-height: 1.6; }
    .board-info strong { color: #1a1a1a; }
    .board-overview-wrap { margin-top: 1.25rem; }
    .board-overview-wrap .section-label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }
    #board-overview-canvas { image-rendering: pixelated; display: block; max-width: 100%; border-radius: 8px; border: 2px solid #e8e8e0; }
    .board-grid-wrap { margin-top: 1.5rem; }
    .board-grid-wrap .section-label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 10px; }
    .board-grid { display: grid; gap: 16px; }
    .board-card { background: #fafaf8; border: 1px solid #e8e8e0; border-radius: 10px; padding: 10px; }
    .board-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .board-card-num { font-size: 13px; font-weight: 700; color: #1a1a1a; }
    .board-card-sub { font-size: 11px; color: #999; }
    .board-card canvas { image-rendering: pixelated; display: block; max-width: 100%; border-radius: 6px; border: 1px solid #e0e0d8; }
    .board-card-colors { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .board-card-colors .color-chip { font-size: 11px; padding: 2px 6px; }
    .btn-dl-board { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 1px solid #e0e0d8; background: #fff; cursor: pointer; color: #555; }
    .btn-dl-board:hover { background: #f5f5f0; }

    /* ── 购物清单 ── */
    .shopping-section { margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid #e8e8e0; }
    .shopping-title { font-size: 15px; font-weight: 600; margin-bottom: 0.75rem; }
    .shopping-summary { font-size: 13px; color: #666; margin-bottom: 0.75rem; padding: 8px 12px; background: #f9f9f7; border-radius: 8px; }
    .shopping-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .shopping-table th { text-align: left; padding: 7px 10px; background: #f5f5f0; font-size: 11px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e8e8e0; }
    .shopping-table td { padding: 6px 10px; border-bottom: 1px solid #f0f0ec; vertical-align: middle; }
    .shopping-table tr:last-child td { border-bottom: none; }
    .shopping-table tr.row-missing td { background: #fffbf5; }
    .tag-have { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
    .tag-need { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #fff3e0; color: #e65100; font-weight: 600; }
    .swatch-sm { display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.12); vertical-align: middle; margin-right: 5px; }

    /* ── 颜色高亮 ── */
    .color-chip { cursor: pointer; transition: all 0.15s; }
    .color-chip:hover { background: #e5e5e2; }
    .color-chip.chip-active { background: #1a1a1a !important; color: #fff !important; }
    .color-chip.chip-active .color-swatch { border-color: rgba(255,255,255,0.35); }
    .color-chip.chip-dim { opacity: 0.35; }

    /* ── 导出 & 分享按钮区 ── */
    .output-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #f0f0ec; align-items: center; }

    /* ── 导出下拉菜单 ── */
    .export-dropdown { position: relative; }
    .export-menu { display: none; position: absolute; top: calc(100% + 4px); left: 0; background: #fff; border: 1px solid #e0e0d8; border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.12); min-width: 160px; z-index: 100; overflow: hidden; }
    .export-menu.open { display: block; }
    .export-menu button { display: block; width: 100%; padding: 9px 14px; text-align: left; background: none; border: none; font-size: 13px; color: #333; cursor: pointer; }
    .export-menu button:hover { background: #f5f5f2; }

    /* ── 分享弹窗 ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .modal-overlay.hidden { display: none; }
    .modal-box { background: #fff; border-radius: 14px; padding: 1.75rem; max-width: 500px; width: 92%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 0.5rem; }
    .modal-desc { font-size: 13px; color: #666; margin-bottom: 1rem; }
    .share-url-box { width: 100%; padding: 10px 12px; border: 1px solid #e0e0d8; border-radius: 8px; font-size: 12px; font-family: monospace; color: #555; background: #f9f9f7; resize: none; height: 76px; line-break: anywhere; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }
    .btn-copy { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn-copy:hover { background: #333; }

    /* ── 图片预处理 ── */
    .pp-toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .pp-radio-group { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #555;
      background: #fff; border: 1px solid #e0e0d8; border-radius: 8px; padding: 5px 10px; }
    .pp-radio-group label { display: flex; align-items: center; gap: 4px; cursor: pointer; white-space: nowrap; }
    .pp-btn { font-size: 12px !important; padding: 5px 12px !important; }
    .pp-canvas-outer { position: relative; display: block; cursor: default; line-height: 0; }
    .pp-canvas-outer.crop-mode, .pp-canvas-outer.lasso-mode { cursor: crosshair; }
    #pp-canvas { display: block; max-width: 100%; border-radius: 8px; border: 1px solid #e0e0d8; }
    .pp-crop-bar { display: none; align-items: center; gap: 8px; margin-top: 8px; }
    .pp-crop-bar.visible { display: flex; }
    .pp-hint { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🫘 MARD 拼豆图纸生成器</h1>
    <p class="subtitle">上传图片，自动转换为 MARD 品牌拼豆格子图纸 · 221色完整色库</p>

    <div class="card">
      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>点击或拖拽图片到这里</p>
        <p style="font-size: 12px; margin-top: 4px;">支持 JPG、PNG、GIF</p>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none">

      <!-- 图片预处理（上传后显示） -->
      <div class="config-module" id="preprocess-panel" style="display:none;margin-top:12px;">
        <div class="module-title">🖼 图片预处理（可选）</div>
        <div class="pp-toolbar">
          <button class="btn pp-btn" id="pp-center-btn">主体居中</button>
          <button class="btn pp-btn" id="pp-lasso-btn">⬡ 框选主体</button>
          <button class="btn pp-btn" id="pp-crop-btn">✂ 手动裁剪</button>
          <button class="btn pp-btn" id="pp-reset-btn">还原原图</button>
        </div>
        <!-- 卡通化控件 -->
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;padding:8px 10px;background:#fff;border:1px solid #e8e8e0;border-radius:8px;">
          <span style="font-size:12px;font-weight:600;color:#555;white-space:nowrap;">🎨 卡通化</span>
          <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:#666;white-space:nowrap;">
            色块
            <input type="range" id="pp-px-size" min="2" max="16" value="6" style="width:72px;accent-color:#1a1a1a;cursor:pointer;">
            <span id="pp-px-size-val" style="min-width:18px;font-weight:600;color:#1a1a1a;">6</span>
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:#666;white-space:nowrap;">
            色数
            <select id="pp-px-colors" style="font-size:12px;padding:3px 6px;border:1px solid #e0e0d8;border-radius:6px;cursor:pointer;">
              <option value="6">6色</option>
              <option value="10">10色</option>
              <option value="16" selected>16色</option>
              <option value="24">24色</option>
              <option value="48">48色</option>
            </select>
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:#666;white-space:nowrap;">
            <input type="checkbox" id="pp-outline" style="accent-color:#1a1a1a;">
            轮廓线
          </label>
          <button class="btn pp-btn btn-primary" id="pp-cartoon-btn" style="background:#1a1a1a;color:#fff;border-color:#1a1a1a;">应用卡通化</button>
        </div>
        <div class="pp-canvas-outer" id="pp-canvas-outer">
          <canvas id="pp-canvas"></canvas>
        </div>
        <div class="pp-crop-bar" id="pp-lasso-bar">
          <span class="pp-hint">按住拖动画线，松开暂停，可多画几笔</span>
          <button class="btn pp-btn" id="pp-lasso-undo" disabled>↩ 撤回</button>
          <button class="btn btn-primary pp-btn" id="pp-lasso-apply" disabled>确认框选</button>
          <button class="btn pp-btn" id="pp-lasso-cancel">取消</button>
        </div>
        <div class="pp-crop-bar" id="pp-crop-bar">
          <span class="pp-hint">在图上拖动选择裁剪区域</span>
          <button class="btn btn-primary pp-btn" id="pp-crop-apply">确认裁剪</button>
          <button class="btn pp-btn" id="pp-crop-cancel">取消</button>
        </div>
      </div>

      <!-- 核心设置：成品尺寸 -->
      <div style="margin-bottom:12px;">
        <label class="cfg-label">成品尺寸</label>
        <div class="custom-row" style="margin-bottom:4px;">
          <input type="number" id="pattern-w" class="num-input" min="1" placeholder="宽" style="width:70px;">
          <span class="sep">×</span>
          <input type="number" id="pattern-h" class="num-input" min="1" placeholder="高" style="width:70px;">
          <label style="color:#999;font-size:13px;">格</label>
        </div>
        <div id="size-hint" style="font-size:12px;color:#bbb;">推荐 25×25，最大不超过 50×50 格</div>
        <div id="smart-hint" style="font-size:12px;color:#888;margin-top:5px;padding:6px 10px;background:#f7f7f5;border-radius:6px;display:none;line-height:1.5;"></div>
      </div>

      <!-- 艺术风格 -->
      <div style="margin-bottom:12px;">
        <label class="cfg-label">艺术风格</label>
        <div class="style-btns">
          <button class="style-btn" data-style="realistic">
            <div class="style-name">写实</div>
            <div class="style-desc">抖动算法·高还原</div>
          </button>
          <button class="style-btn active" data-style="simplified">
            <div class="style-name">简化</div>
            <div class="style-desc">色块清晰·推荐</div>
          </button>
          <button class="style-btn" data-style="cartoon">
            <div class="style-name">卡通</div>
            <div class="style-desc">大色块·易拼</div>
          </button>
          <button class="style-btn" data-style="minimal">
            <div class="style-name">极简</div>
            <div class="style-desc">极少色·新手</div>
          </button>
        </div>
      </div>

      <!-- 核心设置：颜色套装 + 处理模式 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div>
          <label class="cfg-label">你的颜色套装</label>
          <select id="kit-tier">
            <option value="0">221色（全部）</option>
            <option value="1">24色（系列1）</option>
            <option value="2">48色（系列1-2）</option>
            <option value="3">72色（系列1-3）</option>
            <option value="4">96色（系列1-4）</option>
            <option value="5">120色（系列1-5）</option>
            <option value="6">144色（系列1-6）</option>
            <option value="7">168色（系列1-6+9）</option>
            <option value="8">192色（系列1-6+9-10）</option>
          </select>
        </div>
        <div>
          <label class="cfg-label">处理模式</label>
          <select id="cell-size">
            <option value="6">紧凑（省空间）</option>
            <option value="9" selected>标准</option>
            <option value="12">清晰（易辨认）</option>
            <option value="16">大图（打印用）</option>
          </select>
        </div>
      </div>

      <!-- 实时反馈：只保留两张卡片 -->
      <div class="feedback-grid-2" style="margin-bottom:12px;">
        <div class="fb-item">
          <div class="fb-label">成品大小</div>
          <div class="fb-value" id="fb-size">—</div>
          <div class="fb-sub">格</div>
        </div>
        <div class="fb-item">
          <div class="fb-label">预计用豆</div>
          <div class="fb-value" id="fb-beads">—</div>
          <div class="fb-sub">颗</div>
        </div>
        <!-- 保留隐藏元素供 JS 写入，不展示 -->
        <span id="fb-ratio" style="display:none"></span>
        <span id="fb-ratio-sub" style="display:none"></span>
        <span id="fb-boards" style="display:none"></span>
        <span id="fb-boards-sub" style="display:none"></span>
      </div>

      <!-- 折叠：高级设置（板子配置） -->
      <div class="collapsible-section" style="margin-bottom:8px;">
        <button class="collapsible-btn" id="adv-toggle">
          <span>高级设置</span><span class="caret">▸</span>
        </button>
        <div class="collapsible-body" id="adv-body">
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin-top:10px;">
            <div>
              <label class="cfg-label">板子型号</label>
              <select id="board-type">
                <option value="10">10×10 格板</option>
                <option value="20">20×20 格板</option>
                <option value="25" selected>25×25 格板</option>
                <option value="52">52×52 格板</option>
                <option value="104">104×104 格板</option>
              </select>
            </div>
            <div>
              <label class="cfg-label">横向几块</label>
              <input type="number" id="boards-x" value="2" min="1" max="20" class="num-input">
            </div>
            <div>
              <label class="cfg-label">纵向几块</label>
              <input type="number" id="boards-y" value="2" min="1" max="20" class="num-input">
            </div>
          </div>
          <div style="font-size:12px;color:#aaa;margin-top:8px;">最大可用画布：<strong id="max-canvas-label" style="color:#666;">50 × 50 格</strong></div>
        </div>
      </div>

    // ─── 空格绘制（主体模式的"无豆"格子）────────────────────────────────────────
    function drawEmptyCell(ctx, px, py, cs) {
      ctx.fillStyle = '#e8e8e8';
      ctx.fillRect(px, py, cs, cs);
      ctx.fillStyle = '#d0d0d0';
      const h = cs / 2;
      ctx.fillRect(px,    py,    h, h);
      ctx.fillRect(px+h,  py+h,  h, h);
    }

    // ─── 图片内容分析（上传后自动运行）──────────────────────────────────────────
    function analyzeImageContent(src) {
      const size = 64;
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, size, size);
      ctx.drawImage(src, 0, 0, size, size);
      const d = ctx.getImageData(0, 0, size, size).data;

      // 色彩丰富度（量化到5位精度）
      const colorSet = new Set();
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i]>>3, g = d[i+1]>>3, b = d[i+2]>>3;
        colorSet.add((r<<10)|(g<<5)|b);
      }

      // 边缘密度
      let edgeSum = 0;
      for (let y = 1; y < size-1; y++) {
        for (let x = 1; x < size-1; x++) {
          const i = (y*size+x)*4;
          const dx = (d[(y*size+x+1)*4] - d[(y*size+x-1)*4]) +
                     (d[(y*size+x+1)*4+1] - d[(y*size+x-1)*4+1]) +
                     (d[(y*size+x+1)*4+2] - d[(y*size+x-1)*4+2]);
          const dy = (d[((y+1)*size+x)*4] - d[((y-1)*size+x)*4]) +
                     (d[((y+1)*size+x)*4+1] - d[((y-1)*size+x)*4+1]) +
                     (d[((y+1)*size+x)*4+2] - d[((y-1)*size+x)*4+2]);
          edgeSum += Math.sqrt(dx*dx + dy*dy);
        }
      }
      const edgeDensity = edgeSum / (size * size * 3 * 255);

      // 四边像素方差（背景复杂度）
      const ep = [];
      for (let x = 0; x < size; x++) {
        ep.push(d[x*4], d[x*4+1], d[x*4+2]);
        ep.push(d[((size-1)*size+x)*4], d[((size-1)*size+x)*4+1], d[((size-1)*size+x)*4+2]);
      }
      for (let y = 1; y < size-1; y++) {
        ep.push(d[y*size*4], d[y*size*4+1], d[y*size*4+2]);
        ep.push(d[(y*size+size-1)*4], d[(y*size+size-1)*4+1], d[(y*size+size-1)*4+2]);
      }
      const epMean = ep.reduce((s,v)=>s+v,0)/ep.length;
      const bgVariance = ep.reduce((s,v)=>s+(v-epMean)**2,0)/ep.length;

      return { colorComplexity: colorSet.size, edgeDensity, bgVariance };
    }

    function showSmartHint(analysis) {
      const el = document.getElementById('smart-hint');
      if (!analysis) { el.style.display = 'none'; return; }
      const { colorComplexity, edgeDensity, bgVariance } = analysis;
      const bs = parseInt(document.getElementById('board-type').value);
      let icon, msg, recW, recH;

      if (colorComplexity < 120 && edgeDensity < 0.07) {
        // 简单图案：icon / logo / 贴纸
        icon = '🎯';
        recW = recH = Math.max(15, Math.round(bs * 0.6));
        msg = `图案简单（logo / 贴纸风格），推荐 ${recW}×${recH} 即可清晰还原。可开启「只拼主体」去掉背景。`;
      } else if (colorComplexity > 350 || edgeDensity > 0.16) {
        // 复杂图案：照片 / 人像
        icon = '🖼';
        recW = recH = bs;
        msg = `图案细节丰富（照片 / 人像），推荐至少 ${recW}×${recH} 以上。`;
        if (bgVariance > 1800) msg += ' 四周背景较复杂，建议先裁图突出主体。';
      } else {
        // 中等
        icon = '✏️';
        recW = recH = Math.round(bs * 0.8);
        msg = `图案复杂度适中，推荐 ${recW}×${recH} 左右。`;
      }

      // 更新推荐尺寸输入框（如果用户还没改过就自动填）
      const wEl = document.getElementById('pattern-w');
      const hEl = document.getElementById('pattern-h');
      const { maxW, maxH } = getBoardConfig();
      if (!wEl.dataset.userEdited) wEl.value = Math.min(recW, maxW);
      if (!hEl.dataset.userEdited) hEl.value = Math.min(recH, maxH);
      updateFeedback();

      el.style.display = 'block';
      el.innerHTML = `${icon} <strong>图片分析：</strong>${msg}`;
    }

    // ─── 主体模式：从边缘 BFS 去除背景色格子 ────────────────────────────────────
    function applySubjectMode(grid, gW, gH, tolerance) {
      // 找四边最常见颜色作为背景色
      const borderCount = {};
      for (let x = 0; x < gW; x++) {
        const t = grid[0][x], b = grid[gH-1][x];
        if (t) borderCount[t.name] = (borderCount[t.name]||0)+1;
        if (b) borderCount[b.name] = (borderCount[b.name]||0)+1;
      }
      for (let y = 1; y < gH-1; y++) {
        const l = grid[y][0], r = grid[y][gW-1];
        if (l) borderCount[l.name] = (borderCount[l.name]||0)+1;
        if (r) borderCount[r.name] = (borderCount[r.name]||0)+1;
      }
      const entries = Object.entries(borderCount);
      if (!entries.length) return grid;
      const bgName = entries.sort((a,b)=>b[1]-a[1])[0][0];
      const bg = COLOR_MAP[bgName];
      const tolSq = tolerance * tolerance;

      // BFS 从所有边缘格子出发
      const visited = new Uint8Array(gW * gH);
      const queue = [];
      for (let x = 0; x < gW; x++) { queue.push(x, 0); queue.push(x, gH-1); }
      for (let y = 1; y < gH-1; y++) { queue.push(0, y); queue.push(gW-1, y); }

      let qi = 0;
      while (qi < queue.length) {
        const x = queue[qi++], y = queue[qi++];
        if (x < 0 || x >= gW || y < 0 || y >= gH) continue;
        const idx = y * gW + x;
        if (visited[idx]) continue;
        const cell = grid[y][x];
        if (!cell) { visited[idx] = 1; continue; }
        const dr = cell.r-bg.r, dg = cell.g-bg.g, db = cell.b-bg.b;
        if (dr*dr + dg*dg + db*db > tolSq) continue;
        visited[idx] = 1;
        queue.push(x+1, y); queue.push(x-1, y);
        queue.push(x, y+1); queue.push(x, y-1);
      }

      // 标记背景格为 null
      for (let y = 0; y < gH; y++)
        for (let x = 0; x < gW; x++)
          if (visited[y * gW + x]) grid[y][x] = null;

      return grid;
    }

    function closestColor(r, g, b, palette) {
      let best = palette[0], bestDist = Infinity;
      for (const c of palette) {
        const d = (r-c.r)**2 + (g-c.g)**2 + (b-c.b)**2;
        if (d < bestDist) { bestDist = d; best = c; }
      }
      return best;
    }

    // 全局颜色索引（用于 URL 编码）
    const COLOR_NAMES = Object.keys(MARD_COLORS);
    const COLOR_IDX   = Object.fromEntries(COLOR_NAMES.map((n, i) => [n, i]));

    let currentImageData = null;
    let currentGrid = null, currentGridW = 0, currentGridH = 0, currentCellSize = 0;
    let currentBoardSize = 0, currentBoardsX = 0, currentBoardsY = 0;
    let currentTierIndex = 0, currentColorCount = null, currentShowLabels = true;
    let patternW = 34, patternH = 34;
    let highlightedColor = null;
    let lastImageAnalysis = null; // 上传图片时的分析结果

    // ─── 图片预处理状态 ───────────────────────────────────────────────────────────
    let ppOffscreen   = null;   // 当前预处理后的离屏 canvas（工作分辨率）
    let ppOrigData    = null;   // 原图 ImageData 备份（用于还原）
    let ppCropMode    = false;
    let ppCropStart   = null, ppCropEnd = null, ppDragging = false;
    let ppLassoMode    = false;
    let ppLassoStrokes = [];   // 已完成的笔画，每笔是一个点数组
    let ppLassoCur     = null; // 正在画的当前笔画（按下时非 null）

    const PP_WORK_MAX = 1200; // 工作分辨率上限（像素）
    const PP_DISP_W   = 580;  // 显示宽度上限
    const PP_DISP_H   = 400;  // 显示高度上限

    function ppDispScale() {
      if (!ppOffscreen) return 1;
      return Math.min(1,
        PP_DISP_W / ppOffscreen.width,
        PP_DISP_H / ppOffscreen.height
      );
    }

    function ppInitFromImage(img) {
      const sc = Math.min(1, PP_WORK_MAX / img.naturalWidth, PP_WORK_MAX / img.naturalHeight);
      const w  = Math.max(1, Math.round(img.naturalWidth  * sc));
      const h  = Math.max(1, Math.round(img.naturalHeight * sc));
      ppOffscreen = document.createElement('canvas');
      ppOffscreen.width = w; ppOffscreen.height = h;
      ppOffscreen.getContext('2d').drawImage(img, 0, 0, w, h);
      // 备份原图
      ppOrigData = ppOffscreen.getContext('2d').getImageData(0, 0, w, h);
      ppCropMode = false; ppCropStart = ppCropEnd = null;
      ppUpdateCropUI();
      ppDraw();
      document.getElementById('preprocess-panel').style.display = 'block';
    }

    function ppDraw() {
      if (!ppOffscreen) return;
      const sc = ppDispScale();
      const dW = Math.max(1, Math.round(ppOffscreen.width  * sc));
      const dH = Math.max(1, Math.round(ppOffscreen.height * sc));
      const canvas = document.getElementById('pp-canvas');
      canvas.width = dW; canvas.height = dH;
      const ctx = canvas.getContext('2d');

      // 棋盘格背景（显示透明区域）
      const sz = 10;
      for (let y = 0; y < dH; y += sz) {
        for (let x = 0; x < dW; x += sz) {
          ctx.fillStyle = ((Math.floor(x/sz) + Math.floor(y/sz)) % 2 === 0) ? '#d8d8d8' : '#fff';
          ctx.fillRect(x, y, sz, sz);
        }
      }
      ctx.drawImage(ppOffscreen, 0, 0, dW, dH);

      // 裁剪选区覆盖层
      if (ppCropMode && ppCropStart && ppCropEnd) {
        const rx = Math.min(ppCropStart.x, ppCropEnd.x);
        const ry = Math.min(ppCropStart.y, ppCropEnd.y);
        const rw = Math.abs(ppCropEnd.x - ppCropStart.x);
        const rh = Math.abs(ppCropEnd.y - ppCropStart.y);
        // 暗化选区外
        ctx.fillStyle = 'rgba(0,0,0,0.48)';
        ctx.fillRect(0, 0, dW, dH);
        // 还原选区内图像
        if (rw > 2 && rh > 2) {
          ctx.save();
          ctx.beginPath();
          ctx.rect(rx, ry, rw, rh);
          ctx.clip();
          // 先画棋盘格
          for (let y = ry; y < ry+rh; y += sz) {
            for (let x = rx; x < rx+rw; x += sz) {
              ctx.fillStyle = ((Math.floor(x/sz) + Math.floor(y/sz)) % 2 === 0) ? '#d8d8d8' : '#fff';
              ctx.fillRect(x, y, sz, sz);
            }
          }
          ctx.drawImage(ppOffscreen, rx/sc, ry/sc, rw/sc, rh/sc, rx, ry, rw, rh);
          ctx.restore();
          // 虚线边框
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1.5;
          ctx.setLineDash([5, 4]);
          ctx.strokeRect(rx + 0.75, ry + 0.75, rw - 1.5, rh - 1.5);
          ctx.setLineDash([]);
          // 四角把手
          ctx.fillStyle = '#fff';
          for (const [hx, hy] of [[rx,ry],[rx+rw,ry],[rx,ry+rh],[rx+rw,ry+rh]]) {
            ctx.beginPath(); ctx.arc(hx, hy, 4.5, 0, Math.PI*2); ctx.fill();
          }
        }
      }

      // 手绘套索覆盖层
      if (ppLassoMode) {
        // 合并所有已完成笔画 + 当前正在画的笔画
        const allStrokes = ppLassoCur
          ? [...ppLassoStrokes, ppLassoCur]
          : ppLassoStrokes;
        const allPts = allStrokes.flat();

        // 有足够点时显示半透明预览
        if (allPts.length > 5) {
          ctx.save();
          ctx.fillStyle = 'rgba(0,0,0,0.42)';
          ctx.fillRect(0, 0, dW, dH);
          // 把所有笔画合并成一条路径（依次连接）
          ctx.beginPath();
          ctx.moveTo(allPts[0].x, allPts[0].y);
          for (let i = 1; i < allPts.length; i++) ctx.lineTo(allPts[i].x, allPts[i].y);
          ctx.closePath();
          ctx.clip();
          for (let y = 0; y < dH; y += sz) {
            for (let x = 0; x < dW; x += sz) {
              ctx.fillStyle = ((Math.floor(x/sz)+Math.floor(y/sz))%2===0) ? '#d8d8d8':'#fff';
              ctx.fillRect(x, y, sz, sz);
            }
          }
          ctx.drawImage(ppOffscreen, 0, 0, dW, dH);
          ctx.restore();
        }

        // 画每一笔的线条
        ctx.strokeStyle = 'rgba(255,90,0,0.9)';
        ctx.lineWidth   = 2.5;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        for (const stroke of allStrokes) {
          if (stroke.length < 2) continue;
          ctx.beginPath();
          ctx.moveTo(stroke[0].x, stroke[0].y);
          for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
          ctx.stroke();
        }
        ctx.lineCap = 'butt'; ctx.lineJoin = 'miter';
      }
    }

    // ── 主体居中（自动识别内容边框并裁剪）────────────────────────────────────────
    function ppAutoCenter() {
      if (!ppOffscreen) return;
      const ctx = ppOffscreen.getContext('2d');
      const W = ppOffscreen.width, H = ppOffscreen.height;
      const d = ctx.getImageData(0,0,W,H).data;
      let x0=W,x1=0,y0=H,y1=0;
      for (let y=0;y<H;y++) {
        for (let x=0;x<W;x++) {
          const i=(y*W+x)*4;
          const a=d[i+3], r=d[i], g=d[i+1], b=d[i+2];
          if (a<15||(r>242&&g>242&&b>242)) continue;  // 透明 or 纯白跳过
          if (x<x0)x0=x; if (x>x1)x1=x; if (y<y0)y0=y; if (y>y1)y1=y;
        }
      }
      if (x0>=x1||y0>=y1) return;
      const pad = Math.max(8, Math.round(Math.min(x1-x0,y1-y0)*0.04));
      const sx=Math.max(0,x0-pad), sy=Math.max(0,y0-pad);
      const sw=Math.min(W-sx,x1-x0+pad*2+1), sh=Math.min(H-sy,y1-y0+pad*2+1);
      const nc=document.createElement('canvas');
      nc.width=sw; nc.height=sh;
      nc.getContext('2d').drawImage(ppOffscreen,sx,sy,sw,sh,0,0,sw,sh);
      ppOffscreen=nc;
      ppDraw();
    }

    // ── 卡通化（量化→块投票→噪点去除→轮廓增强）────────────────────────────────
    function ppCartoonize() {
      if (!ppOffscreen) return;
      const blockSize = parseInt(document.getElementById('pp-px-size').value) || 8;
      const numColors = parseInt(document.getElementById('pp-px-colors').value) || 16;
      const outlineOn = document.getElementById('pp-outline').checked;
      const ctx = ppOffscreen.getContext('2d');
      const W = ppOffscreen.width, H = ppOffscreen.height;
      const imgData = ctx.getImageData(0, 0, W, H);
      const src = imgData.data;

      // ① K-means++ 色彩量化（先量化，再做块化，避免平均色导致模糊）
      const step = Math.max(1, Math.floor((W * H) / 5000));
      const samples = [];
      for (let i = 0; i < W * H; i += step) {
        const pi = i * 4;
        if (src[pi+3] >= 128) samples.push([src[pi], src[pi+1], src[pi+2]]);
      }
      if (samples.length < numColors) { ppDraw(); return; }

      // K-means++ 初始化：按距离²概率选质心，收敛更快更好
      const centroids = [samples[Math.floor(Math.random() * samples.length)]];
      while (centroids.length < numColors) {
        const dists = samples.map(s => {
          let minD = Infinity;
          for (const c of centroids) {
            const d = (s[0]-c[0])**2+(s[1]-c[1])**2+(s[2]-c[2])**2;
            if (d < minD) minD = d;
          }
          return minD;
        });
        const sum = dists.reduce((a,v) => a+v, 0);
        let r = Math.random() * sum, idx = 0;
        for (; idx < dists.length-1; idx++) { r -= dists[idx]; if (r <= 0) break; }
        centroids.push([...samples[idx]]);
      }

      // 迭代 15 次
      for (let iter = 0; iter < 15; iter++) {
        const sums = Array.from({length: numColors}, () => [0,0,0,0]);
        for (const [r,g,b] of samples) {
          let best = 0, bestD = Infinity;
          for (let k = 0; k < numColors; k++) {
            const d=(r-centroids[k][0])**2+(g-centroids[k][1])**2+(b-centroids[k][2])**2;
            if (d < bestD) { bestD = d; best = k; }
          }
          sums[best][0]+=r; sums[best][1]+=g; sums[best][2]+=b; sums[best][3]++;
        }
        for (let k = 0; k < numColors; k++) {
          const n = sums[k][3];
          if (n > 0) centroids[k] = [Math.round(sums[k][0]/n), Math.round(sums[k][1]/n), Math.round(sums[k][2]/n)];
        }
      }

      // 每个像素映射到最近质心（存索引）
      const quantIdx = new Int32Array(W * H);
      for (let i = 0; i < W * H; i++) {
        const pi = i * 4;
        if (src[pi+3] < 128) { quantIdx[i] = -1; continue; }
        let best = 0, bestD = Infinity;
        for (let k = 0; k < numColors; k++) {
          const d=(src[pi]-centroids[k][0])**2+(src[pi+1]-centroids[k][1])**2+(src[pi+2]-centroids[k][2])**2;
          if (d < bestD) { bestD = d; best = k; }
        }
        quantIdx[i] = best;
      }

      // ② 块化：多数投票（不平均，保证边界清晰）
      const bCols = Math.ceil(W / blockSize);
      const bRows = Math.ceil(H / blockSize);
      const blockGrid = new Int32Array(bCols * bRows);
      for (let br = 0; br < bRows; br++) {
        for (let bc = 0; bc < bCols; bc++) {
          const votes = new Int32Array(numColors);
          for (let y = br*blockSize; y < Math.min((br+1)*blockSize, H); y++)
            for (let x = bc*blockSize; x < Math.min((bc+1)*blockSize, W); x++) {
              const q = quantIdx[y*W+x];
              if (q >= 0) votes[q]++;
            }
          let best = 0, bestV = 0;
          for (let k = 0; k < numColors; k++) if (votes[k] > bestV) { bestV = votes[k]; best = k; }
          blockGrid[br*bCols+bc] = best;
        }
      }

      // ③ 噪点去除：对块网格做 2 次多数滤波（消除孤立小色块）
      for (let pass = 0; pass < 2; pass++) {
        const next = new Int32Array(blockGrid);
        for (let br = 0; br < bRows; br++) {
          for (let bc = 0; bc < bCols; bc++) {
            const votes = new Int32Array(numColors);
            for (let dy = -1; dy <= 1; dy++)
              for (let dx = -1; dx <= 1; dx++) {
                const nr = Math.min(bRows-1, Math.max(0, br+dy));
                const nc = Math.min(bCols-1, Math.max(0, bc+dx));
                votes[blockGrid[nr*bCols+nc]]++;
              }
            let best = blockGrid[br*bCols+bc], bestV = 0;
            for (let k = 0; k < numColors; k++) if (votes[k] > bestV) { bestV = votes[k]; best = k; }
            next[br*bCols+bc] = best;
          }
        }
        blockGrid.set(next);
      }

      // ④ 渲染：纯色块填充（无描边）
      const result = new Uint8ClampedArray(src.length);
      for (let br = 0; br < bRows; br++) {
        for (let bc = 0; bc < bCols; bc++) {
          const [R, G, B] = centroids[blockGrid[br*bCols+bc]];
          for (let py = br*blockSize; py < Math.min((br+1)*blockSize, H); py++)
            for (let px = bc*blockSize; px < Math.min((bc+1)*blockSize, W); px++) {
              const pi = (py*W+px)*4;
              result[pi]=R; result[pi+1]=G; result[pi+2]=B; result[pi+3]=255;
            }
        }
      }

      // ⑤ 轮廓增强（后处理：扫描相邻像素颜色不同处才描边，不描块内部）
      if (outlineOn) {
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            const pi = (y*W+x)*4;
            let onBoundary = false;
            if (x > 0) {
              const li = pi - 4;
              if (result[pi]!==result[li]||result[pi+1]!==result[li+1]||result[pi+2]!==result[li+2]) onBoundary=true;
            }
            if (!onBoundary && y > 0) {
              const ui = ((y-1)*W+x)*4;
              if (result[pi]!==result[ui]||result[pi+1]!==result[ui+1]||result[pi+2]!==result[ui+2]) onBoundary=true;
            }
            if (onBoundary) {
              result[pi]=Math.round(result[pi]*0.5);
              result[pi+1]=Math.round(result[pi+1]*0.5);
              result[pi+2]=Math.round(result[pi+2]*0.5);
            }
          }
        }
      }

      imgData.data.set(result);
      ctx.putImageData(imgData, 0, 0);
      ppDraw();
    }

    function ppEnterCrop() {

    }
    function ppApplyCrop() {
      if (!ppCropStart||!ppCropEnd) { ppCancelCrop(); return; }
      const sc=ppDispScale();
      const rx=Math.min(ppCropStart.x,ppCropEnd.x), ry=Math.min(ppCropStart.y,ppCropEnd.y);
      const rw=Math.abs(ppCropEnd.x-ppCropStart.x), rh=Math.abs(ppCropEnd.y-ppCropStart.y);
      if (rw<8||rh<8) { ppCancelCrop(); return; }
      const sx=Math.round(rx/sc), sy=Math.round(ry/sc);
      const sw=Math.max(1,Math.round(rw/sc)), sh=Math.max(1,Math.round(rh/sc));
      const nc=document.createElement('canvas');
      nc.width=sw; nc.height=sh;
      nc.getContext('2d').drawImage(ppOffscreen,sx,sy,sw,sh,0,0,sw,sh);
      ppOffscreen=nc;
      ppCropMode=false; ppCropStart=ppCropEnd=null;
      ppUpdateCropUI(); ppDraw();
    }

      ppCropMode=false; ppCropStart=ppCropEnd=null; ppUpdateCropUI(); ppDraw();

    // ── 手绘套索 ─────────────────────────────────────────────────────────────────
    function ppEnterLasso() {
      ppLassoMode    = true;
      ppLassoStrokes = [];
      ppLassoCur     = null;
      ppCropMode = false; ppCropStart = ppCropEnd = null;
      ppUpdateCropUI();
      ppUpdateLassoUI();
      ppDraw();
    }

    function ppApplyLasso() {
      const allPts = ppLassoStrokes.flat();
      if (allPts.length < 3) { ppCancelLasso(); return; }
      const sc  = ppDispScale();
      const pts = allPts.map(p => ({ x: p.x / sc, y: p.y / sc }));
      const nc  = document.createElement('canvas');
      nc.width  = ppOffscreen.width;
      nc.height = ppOffscreen.height;
      const ctx = nc.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, nc.width, nc.height);
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(ppOffscreen, 0, 0);
      ppOffscreen    = nc;
      ppLassoMode    = false;
      ppLassoStrokes = [];
      ppLassoCur     = null;
      ppUpdateLassoUI();
      ppDraw();
    }

    function ppUndoLasso() {
      ppLassoStrokes.pop();
      ppUpdateLassoUI();
      ppDraw();
    }

      ppLassoMode    = false;

    // 鼠标 & 触摸事件
    (function(){
      const c = document.getElementById('pp-canvas');

      function getPos(clientX, clientY) {
        const r = c.getBoundingClientRect();
        return {
          x: Math.max(0, Math.min(c.width,  clientX - r.left)),
          y: Math.max(0, Math.min(c.height, clientY - r.top))
        };
      }

      function lassoAdd(p) {
        if (!ppLassoCur) return;
        const last = ppLassoCur[ppLassoCur.length - 1];
        if (!last || Math.hypot(p.x - last.x, p.y - last.y) > 2) {
          ppLassoCur.push(p);
          ppDraw();
        }
      }

      // ── 鼠标 ──
      c.addEventListener('mousedown', e => {
        if (ppLassoMode) {
          ppLassoCur = [];
          ppDragging = true;
          lassoAdd(getPos(e.clientX, e.clientY));
          e.preventDefault(); return;
        }
        if (!ppCropMode) return;
        const p = getPos(e.clientX, e.clientY);
        ppCropStart = p; ppCropEnd = {...p}; ppDragging = true; e.preventDefault();
      });

      c.addEventListener('mousemove', e => {
        if (ppLassoMode && ppDragging) {
          lassoAdd(getPos(e.clientX, e.clientY)); return;
        }
        if (!ppDragging) return;
        ppCropEnd = getPos(e.clientX, e.clientY); ppDraw();
      });

      c.addEventListener('mouseup', () => {
        if (ppLassoMode && ppDragging && ppLassoCur) {
          ppDragging = false;
          if (ppLassoCur.length > 3) {
            ppLassoStrokes.push(ppLassoCur);
            ppUpdateLassoUI();
          }
          ppLassoCur = null;
          ppDraw(); return;
        }
        ppDragging = false;
      });

          ppLassoCur = [];

          lassoAdd(getPos(t.clientX, t.clientY));
          e.preventDefault(); return;
        }
        if (!ppCropMode) return;
        const p = getPos(t.clientX, t.clientY);
        ppCropStart = p; ppCropEnd = {...p}; ppDragging = true; e.preventDefault();
      }, {passive:false});

      c.addEventListener('touchmove', e => {
        const t = e.touches[0];
        if (ppLassoMode && ppDragging) {
          lassoAdd(getPos(t.clientX, t.clientY));
          e.preventDefault(); return;
        }
        if (!ppDragging) return;
        ppCropEnd = getPos(t.clientX, t.clientY); ppDraw(); e.preventDefault();
      }, {passive:false});

      c.addEventListener('touchend', () => {
        if (ppLassoMode && ppDragging && ppLassoCur) {
          ppDragging = false;
          if (ppLassoCur.length > 3) {
            ppLassoStrokes.push(ppLassoCur);
            ppUpdateLassoUI();
          }
          ppLassoCur = null;
          ppDraw(); return;

    // ── 颜色 K-means 合并（把已用色压缩到 maxColors 种）─────────────────────────
    function reduceColorsKMeans(grid, gW, gH, colorCount, maxColors, palette) {
      const usedNames  = Object.keys(colorCount).sort((a,b) => colorCount[b]-colorCount[a]);
      if (usedNames.length <= maxColors) return { grid, colorCount };
      const usedColors = usedNames.map(n => COLOR_MAP[n]);

      // 初始质心：取使用量最多的 maxColors 个
      let centroids = usedColors.slice(0, maxColors).map(c => ({r:c.r,g:c.g,b:c.b}));

      for (let iter = 0; iter < 12; iter++) {
        const sums = centroids.map(() => ({r:0,g:0,b:0,n:0}));
        for (const c of usedColors) {
          let best=0, bestD=Infinity;
          for (let k=0;k<centroids.length;k++) {
            const d=(c.r-centroids[k].r)**2+(c.g-centroids[k].g)**2+(c.b-centroids[k].b)**2;
            if (d<bestD){bestD=d;best=k;}
          }
          sums[best].r+=c.r*colorCount[c.name];
          sums[best].g+=c.g*colorCount[c.name];
          sums[best].b+=c.b*colorCount[c.name];
          sums[best].n+=colorCount[c.name];
        }
        centroids = sums.map((s,k) => s.n>0
          ? {r:Math.round(s.r/s.n),g:Math.round(s.g/s.n),b:Math.round(s.b/s.n)}
          : centroids[k]);
      }

      // 每个质心 → 最近 MARD 色
      const centroidColors = centroids.map(c => closestColor(c.r,c.g,c.b,palette));

      // 建立重映射表
      const remap = {};
      for (const c of usedColors) {
        let best=0,bestD=Infinity;
        for (let k=0;k<centroids.length;k++) {
          const d=(c.r-centroids[k].r)**2+(c.g-centroids[k].g)**2+(c.b-centroids[k].b)**2;
          if (d<bestD){bestD=d;best=k;}
        }
        remap[c.name] = centroidColors[best];
      }

      // 应用重映射（K-means 阶段 grid 无 null，防御性跳过）
      const newCC = {};
      for (let y=0;y<gH;y++) for (let x=0;x<gW;x++) {
        if (!grid[y][x]) continue;
        const nc = remap[grid[y][x].name] || grid[y][x];
        grid[y][x] = nc;
        newCC[nc.name] = (newCC[nc.name]||0) + 1;
      }
      return { grid, colorCount: newCC };
    }

    // ── 智能色彩去重（RGB 距离 < threshold 的颜色合并）────────────────────────────
    function deduplicateColors(grid, gW, gH, colorCount, threshold) {
      const names  = Object.keys(colorCount).sort((a,b) => colorCount[b]-colorCount[a]);
      const thSq   = threshold * threshold;
      const remap  = {};   // name → color 对象

      for (let i=0;i<names.length;i++) {
        const target = remap[names[i]] || COLOR_MAP[names[i]];
        for (let j=i+1;j<names.length;j++) {
          if (remap[names[j]]) continue;
          const c = COLOR_MAP[names[j]];
          const d = (target.r-c.r)**2+(target.g-c.g)**2+(target.b-c.b)**2;
          if (d < thSq) remap[names[j]] = target;
        }
      }
      if (!Object.keys(remap).length) return { grid, colorCount };

      const newCC = {};
      for (let y=0;y<gH;y++) for (let x=0;x<gW;x++) {
        if (!grid[y][x]) continue;
        const nc = remap[grid[y][x].name] || grid[y][x];
        grid[y][x] = nc;
        newCC[nc.name] = (newCC[nc.name]||0) + 1;
      }
      return { grid, colorCount: newCC };
    }

    // ── 噪点色合并：颗数 < minCount 的颜色合并到最近主色 ─────────────────────────
    function mergeRareColors(grid, gW, gH, colorCount, minCount) {
      const mainColors = Object.keys(colorCount).filter(n => colorCount[n] >= minCount).map(n => COLOR_MAP[n]);
      if (!mainColors.length) return { grid, colorCount };
      const remap = {};
      for (const [name, cnt] of Object.entries(colorCount)) {
        if (cnt >= minCount) continue;
        const c = COLOR_MAP[name];
        let best = mainColors[0], bestD = Infinity;
        for (const m of mainColors) {
          const d = (c.r-m.r)**2 + (c.g-m.g)**2 + (c.b-m.b)**2;
          if (d < bestD) { bestD = d; best = m; }
        }
        remap[name] = best;
      }
      if (!Object.keys(remap).length) return { grid, colorCount };
      const newCC = {};
      for (let y = 0; y < gH; y++) for (let x = 0; x < gW; x++) {
        if (!grid[y][x]) continue;
        const nc = remap[grid[y][x].name] || grid[y][x];
        grid[y][x] = nc;
        newCC[nc.name] = (newCC[nc.name] || 0) + 1;
      }
      return { grid, colorCount: newCC };
    }

    // ── RGB → LAB 色彩空间转换 ──────────────────────────────────────────────────
    function rgbToLab(r, g, b) {
      let rr = r/255, gg = g/255, bb = b/255;
      rr = rr > 0.04045 ? ((rr+0.055)/1.055)**2.4 : rr/12.92;
      gg = gg > 0.04045 ? ((gg+0.055)/1.055)**2.4 : gg/12.92;
      bb = bb > 0.04045 ? ((bb+0.055)/1.055)**2.4 : bb/12.92;
      const x = (rr*0.4124 + gg*0.3576 + bb*0.1805)/0.95047;
      const y = (rr*0.2126 + gg*0.7152 + bb*0.0722)/1.00000;
      const z = (rr*0.0193 + gg*0.1192 + bb*0.9505)/1.08883;
      const f = t => t > 0.008856 ? t**(1/3) : 7.787*t + 16/116;
      return [116*f(y)-16, 500*(f(x)-f(y)), 200*(f(y)-f(z))];
    }

    // ── 智能选色：先对图片像素做 K-means，再映射到色库 ────────────────────────
    // 保证选出的 N 种颜色真正代表图片内容，而非对全色库盲目匹配
    function selectSmartPalette(imgData, n, palette) {
      // 1. 采样像素（跳过透明和近白背景，最多 6000 个点）
      // 同时记录整张图实际最暗/最亮像素，稍后强制加入色板
      const px = [];
      let darkestLum = Infinity,  darkR = 0,   darkG = 0,   darkB = 0;
      let lightestLum = -Infinity, lightR = 255, lightG = 255, lightB = 255;
      for (let i = 0; i < imgData.data.length; i += 4) {
        const a = imgData.data[i+3];
        if (a < 30) continue;
        const r = imgData.data[i], g = imgData.data[i+1], b = imgData.data[i+2];
        const lum = 0.2126*r + 0.7152*g + 0.0722*b;
        if (lum < darkestLum)  { darkestLum  = lum;  darkR  = r; darkG  = g; darkB  = b; }
        if (lum > lightestLum) { lightestLum = lum; lightR = r; lightG = g; lightB = b; }
        if (r > 245 && g > 245 && b > 245) continue;
        px.push(r, g, b);
      }
      if (px.length < 6) return palette.slice(0, n);
      const step = Math.max(1, Math.floor(px.length / 3 / 6000)) * 3;
      const samples = [];
      for (let i = 0; i < px.length; i += step) samples.push([px[i], px[i+1], px[i+2]]);

      // 2. K-means++ 初始化
      const k = Math.min(n, samples.length);
      const centroids = [samples[Math.floor(Math.random()*samples.length)].slice()];
      while (centroids.length < k) {
        const dists = samples.map(p => {
          let minD = Infinity;
          for (const c of centroids) {
            const d = (p[0]-c[0])**2 + (p[1]-c[1])**2 + (p[2]-c[2])**2;
            if (d < minD) minD = d;
          }
          return minD;
        });
        const total = dists.reduce((s,d) => s+d, 0);
        let r = Math.random() * total, idx = 0;
        for (; idx < dists.length-1; idx++) { r -= dists[idx]; if (r <= 0) break; }
        centroids.push(samples[idx].slice());
      }

      // 3. K-means 迭代
      for (let iter = 0; iter < 15; iter++) {
        const sums = centroids.map(() => [0,0,0,0]);
        for (const p of samples) {
          let best = 0, bestD = Infinity;
          for (let ci = 0; ci < centroids.length; ci++) {
            const c = centroids[ci];
            const d = (p[0]-c[0])**2 + (p[1]-c[1])**2 + (p[2]-c[2])**2;
            if (d < bestD) { bestD = d; best = ci; }
          }
          sums[best][0] += p[0]; sums[best][1] += p[1]; sums[best][2] += p[2]; sums[best][3]++;
        }
        let moved = false;
        for (let ci = 0; ci < centroids.length; ci++) {
          const s = sums[ci];
          if (s[3] === 0) continue;
          const nr = s[0]/s[3], ng = s[1]/s[3], nb = s[2]/s[3];
          if (Math.abs(nr-centroids[ci][0])+Math.abs(ng-centroids[ci][1])+Math.abs(nb-centroids[ci][2]) > 0.5) moved = true;
          centroids[ci] = [nr, ng, nb];
        }
        if (!moved) break;
      }

      // 4. 每个质心 → 色库中最近的豆号（去重）
      const seen = new Map();
      for (const [cr, cg, cb] of centroids) {
        const c = closestColor(Math.round(cr), Math.round(cg), Math.round(cb), palette);
        seen.set(c.name, c);
      }

      // 5. 强制加入图片实际最暗色的豆号
      // K-means 在暗色区域像素少时可能不分配质心，导致深色丢失
      if (darkestLum < 80) {
        const dc = closestColor(darkR, darkG, darkB, palette);
        seen.set(dc.name, dc);
        // 额外：若套装含 H7（纯黑 RGB 1,1,1），且图有明显暗部，直接加入
        // closestColor 在图片无纯黑像素时会跳过 H7；强制加入后
        // 抖动算法可在误差积累时用到它，写实照片效果更准确
        if (darkestLum < 60) {
          const h7 = palette.find(p => p.name === 'H7');
          if (h7) seen.set('H7', h7);
        }
      }
      // 注：不强制加最亮色（H1）——H1 在 LAB 去重时会把所有浅灰都吸收，损害颜色多样性

      return [...seen.values()];
    }

    // ── LAB 去重 + 对比度优先：ΔE < threshold 的颜色只保留对比度更强的 ──────────
    function deduplicateColorsLAB(colors, threshold) {
      // |L* - 50| 越大 = 越亮/越暗 = 对比度越高，优先保留
      const withLab = colors.map(c => ({ c, lab: rgbToLab(c.r, c.g, c.b) }));
      withLab.sort((a, b) => Math.abs(b.lab[0]-50) - Math.abs(a.lab[0]-50));
      const kept = [];
      for (const { c, lab } of withLab) {
        const tooClose = kept.some(k => {
          const dE = Math.sqrt((lab[0]-k.lab[0])**2 + (lab[1]-k.lab[1])**2 + (lab[2]-k.lab[2])**2);
          return dE < threshold;
        });
        if (!tooClose) kept.push({ c, lab });
      }
      return kept.map(k => k.c);
    }

    // ── Floyd-Steinberg 抖动（写实模式）─────────────────────────────────────────
    // 将量化误差扩散到相邻格，让有限颜色看起来更丰富
    function floydSteinbergDither(imgData, gW, gH, palette) {
      // 用浮点数组积累误差
      const fr = new Float32Array(gW * gH);
      const fg = new Float32Array(gW * gH);
      const fb = new Float32Array(gW * gH);
      for (let i = 0; i < gW * gH; i++) {
        const pi = i * 4;
        const a = imgData.data[pi+3];
        fr[i] = a < 30 ? 255 : imgData.data[pi];
        fg[i] = a < 30 ? 255 : imgData.data[pi+1];
        fb[i] = a < 30 ? 255 : imgData.data[pi+2];
      }

      const grid = [];
      const colorCount = {};
      for (let y = 0; y < gH; y++) {
        grid[y] = [];
        for (let x = 0; x < gW; x++) {
          const i = y * gW + x;
          const r = Math.max(0, Math.min(255, Math.round(fr[i])));
          const g = Math.max(0, Math.min(255, Math.round(fg[i])));
          const b = Math.max(0, Math.min(255, Math.round(fb[i])));

          const c = closestColor(r, g, b, palette);
          grid[y][x] = c;
          colorCount[c.name] = (colorCount[c.name] || 0) + 1;

          // 扩散误差到右、左下、下、右下（Floyd-Steinberg 系数）
          const er = r - c.r, eg = g - c.g, eb = b - c.b;
          const spread = (di, w) => {
            fr[di] += er * w; fg[di] += eg * w; fb[di] += eb * w;
          };
          if (x+1 < gW)            spread(i+1,          7/16);
          if (y+1 < gH) {
            if (x > 0)              spread((y+1)*gW+x-1, 3/16);
                                    spread((y+1)*gW+x,   5/16);
            if (x+1 < gW)          spread((y+1)*gW+x+1, 1/16);
          }
        }
      }
      return { grid, colorCount };
    }

    // ── 网格噪点去除（卡通/极简模式）──────────────────────────────────────────
    // 对已量化的格子做多数滤波，消除孤立小色块
    function gridNoiseRemoval(grid, gW, gH) {
      for (let pass = 0; pass < 2; pass++) {
        const next = grid.map(row => [...row]);
        for (let y = 0; y < gH; y++) {
          for (let x = 0; x < gW; x++) {
            if (!grid[y][x]) { next[y][x] = null; continue; }
            const votes = {};
            for (let dy = -1; dy <= 1; dy++)
              for (let dx = -1; dx <= 1; dx++) {
                const cell = grid[Math.min(gH-1,Math.max(0,y+dy))][Math.min(gW-1,Math.max(0,x+dx))];
                if (cell) votes[cell.name] = (votes[cell.name]||0)+1;
              }
            let best = grid[y][x], bestV = 0;
            for (const [name, cnt] of Object.entries(votes))
              if (cnt > bestV) { bestV = cnt; best = COLOR_MAP[name]; }
            next[y][x] = best;
          }
        }
        grid = next;
      }
      const colorCount = {};
      for (let y = 0; y < gH; y++)
        for (let x = 0; x < gW; x++) {
          const c = grid[y][x];
          if (c) colorCount[c.name] = (colorCount[c.name]||0)+1;
        }
      return { grid, colorCount };
    }

    document.getElementById('convert-btn').addEventListener('click', () => {
      if (!currentImageData) return;
      const boardSize  = parseInt(document.getElementById('board-type').value);
      const cellSize   = parseInt(document.getElementById('cell-size').value);
      const tierIndex  = parseInt(document.getElementById('kit-tier').value);
      const showLabels = document.getElementById('show-labels').checked;

      // ① 保持原始宽高比，在 patternW × patternH 框内等比缩放（截断到最大画布）
      const { maxW: limitW, maxH: limitH } = getBoardConfig();
      const clampedW = Math.min(patternW, limitW);
      const clampedH = Math.min(patternH, limitH);
      const src  = ppOffscreen || currentImageData;
      const srcW = src instanceof HTMLCanvasElement ? src.width  : src.naturalWidth;
      const srcH = src instanceof HTMLCanvasElement ? src.height : src.naturalHeight;
      let gridW = clampedW, gridH = clampedH;
      if (srcW > 0 && srcH > 0) {
        const byW = { w: clampedW, h: Math.max(1, Math.round(clampedW * srcH / srcW)) };
        const byH = { w: Math.max(1, Math.round(clampedH * srcW / srcH)), h: clampedH };
        if (byW.h <= clampedH) { gridW = byW.w; gridH = byW.h; }
        else                   { gridW = byH.w; gridH = byH.h; }
      }

      const palette = getPalette(tierIndex);

      const hc = document.getElementById('hidden-canvas');
      hc.width = gridW; hc.height = gridH;
      const hctx = hc.getContext('2d');
      hctx.fillStyle = '#ffffff';
      hctx.fillRect(0, 0, gridW, gridH);
      hctx.drawImage(src, 0, 0, gridW, gridH);
      const imgData = hctx.getImageData(0, 0, gridW, gridH);

      // 艺术风格配置
      const style = document.querySelector('.style-btn.active')?.dataset.style || 'simplified';
      const STYLE_CFG = {
        realistic:  { n: null, dither: true,  labDedup: 2, noise: false },
        simplified: { n: null, dither: true,  labDedup: 2, noise: false },
        cartoon:    { n: 12,   dither: false, labDedup: 4, noise: true  },
        minimal:    { n: 6,    dither: false, labDedup: 6, noise: true  },
      };
      const styleCfg = STYLE_CFG[style] || STYLE_CFG.simplified;

      // ① 智能选色：K-means 从图片中提取代表色 → 映射到色库 → LAB 去重
      const totalCells = gridW * gridH;
      const dynamicN   = totalCells <= 400 ? 8 : totalCells <= 1600 ? 16 : 24;
      const targetN    = styleCfg.n || dynamicN;
      // 多取一倍质心，去重后确保够用
      let selectedPalette = selectSmartPalette(imgData, targetN * 2, palette);
      selectedPalette = deduplicateColorsLAB(selectedPalette, styleCfg.labDedup);

      // ② 量化：抖动或直接映射，均使用智能选出的 selectedPalette
      let grid, colorCount;
      if (styleCfg.dither) {
        ({ grid, colorCount } = floydSteinbergDither(imgData, gridW, gridH, selectedPalette));
      } else {
        grid = []; colorCount = {};
        for (let y = 0; y < gridH; y++) {
          const row = [];
          for (let x = 0; x < gridW; x++) {
            const i = (y * gridW + x) * 4;
            const r = imgData.data[i+3] < 30 ? 255 : imgData.data[i];
            const g = imgData.data[i+3] < 30 ? 255 : imgData.data[i+1];
            const b = imgData.data[i+3] < 30 ? 255 : imgData.data[i+2];
            const c = closestColor(r, g, b, selectedPalette);
            row.push(c);
            colorCount[c.name] = (colorCount[c.name] || 0) + 1;
          }
          grid.push(row);
        }
      }

      // ③ 噪点去除（卡通/极简）
      if (styleCfg.noise) ({ grid, colorCount } = gridNoiseRemoval(grid, gridW, gridH));

      // ④ 自动合并噪点色：颗数 < 10 的颜色合并到最近主色
      ({ grid, colorCount } = mergeRareColors(grid, gridW, gridH, colorCount, 10));

      // ⑥ 主体模式：BFS 去除背景（去除后重新统计，可能再产生零星小色）
      if (document.getElementById('subject-mode').checked) {
        const tol = parseInt(document.getElementById('subject-tolerance').value);
        grid = applySubjectMode(grid, gridW, gridH, tol);
        // 重新统计 colorCount（排除 null 格）
        colorCount = {};
        for (let y = 0; y < gridH; y++)
          for (let x = 0; x < gridW; x++)
            if (grid[y][x]) colorCount[grid[y][x].name] = (colorCount[grid[y][x].name]||0)+1;
        // 主体裁剪后再次合并噪点色
        ({ grid, colorCount } = mergeRareColors(grid, gridW, gridH, colorCount, 10));
      }

      currentGrid = grid;
      currentGridW = gridW; currentGridH = gridH;
      currentCellSize = cellSize;
      currentBoardSize = boardSize;
      currentBoardsX = Math.ceil(gridW / boardSize);
      currentBoardsY = Math.ceil(gridH / boardSize);

      currentTierIndex  = tierIndex;
      currentColorCount = colorCount;
      currentShowLabels = showLabels;
      highlightedColor  = null;

      renderGrid(grid, gridW, gridH, cellSize, showLabels);
      renderStats(colorCount, gridW, gridH, boardSize, currentBoardsX, currentBoardsY, tierIndex);
      renderShoppingList(colorCount, tierIndex);
      renderBoardOverview();
      renderIndividualBoards();
      document.getElementById('output-area').style.display = 'block';
    });

    function renderGrid(grid, gridW, gridH, cellSize, showLabels) {
      const canvas = document.getElementById('grid-canvas');
      canvas.width = gridW * cellSize; canvas.height = gridH * cellSize;
      const ctx = canvas.getContext('2d');

      for (let y = 0; y < gridH; y++) {
        for (let x = 0; x < gridW; x++) {
          const c = grid[y][x];
          if (!c) { drawEmptyCell(ctx, x*cellSize, y*cellSize, cellSize); continue; }
          ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
          ctx.fillRect(x*cellSize, y*cellSize, cellSize, cellSize);
        }
      }
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= gridW; i++) {
        ctx.beginPath(); ctx.moveTo(i*cellSize, 0); ctx.lineTo(i*cellSize, gridH*cellSize); ctx.stroke();
      }
      for (let j = 0; j <= gridH; j++) {
        ctx.beginPath(); ctx.moveTo(0, j*cellSize); ctx.lineTo(gridW*cellSize, j*cellSize); ctx.stroke();
      }
      if (showLabels && cellSize >= 9) {
        const fontSize = Math.max(4, Math.floor(cellSize * 0.42));
        ctx.font = `bold ${fontSize}px Arial,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        for (let y = 0; y < gridH; y++) {
          for (let x = 0; x < gridW; x++) {
            const c = grid[y][x];
            if (!c) continue;
            const lum = 0.299*c.r + 0.587*c.g + 0.114*c.b;
            ctx.fillStyle = lum > 148 ? 'rgba(0,0,0,0.62)' : 'rgba(255,255,255,0.82)';
            ctx.fillText(c.name, x*cellSize + cellSize/2, y*cellSize + cellSize/2);
          }
        }
      }
    }

    function renderStats(colorCount, gridW, gridH, boardSize, boardsX, boardsY, tierIndex) {
      const total    = Object.values(colorCount).reduce((s,v)=>s+v, 0); // 只统计有豆的格子
      const colorNum = Object.keys(colorCount).length;
      const tierInfo = KIT_TIERS[tierIndex];

      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="label">总颗数</div><div class="value">${total.toLocaleString()}</div></div>
        <div class="stat-card"><div class="label">用色数量</div><div class="value">${colorNum} 种</div></div>
        <div class="stat-card"><div class="label">画布大小</div><div class="value" style="font-size:16px">${gridW}×${gridH}</div></div>
        <div class="stat-card"><div class="label">板子配置</div><div class="value" style="font-size:13px;line-height:1.5;padding-top:2px;">${boardSize}×${boardSize}板<br>${boardsX}×${boardsY}=${boardsX*boardsY}块</div></div>
      `;

      const sorted = Object.entries(colorCount).sort((a, b) => b[1] - a[1]);
      document.getElementById('color-legend').innerHTML = sorted.map(([name, count]) => {
        const c = COLOR_MAP[name];
        return `<div class="color-chip" data-color="${name}" onclick="highlightColor('${name}')">
          <div class="color-swatch" style="background:rgb(${c.r},${c.g},${c.b})"></div>
          <span><strong>${name}</strong> ${c.zh} × ${count}颗</span>
        </div>`;
      }).join('');
    }

    // ─── 购物清单 ────────────────────────────────────────────────────────────────
    function renderShoppingList(colorCount, tierIndex) {
      const kitNames = new Set();
      for (const s of KIT_TIERS[tierIndex].series)
        for (const n of SERIES[s]) kitNames.add(n);

      const sorted = Object.entries(colorCount).sort((a, b) => b[1] - a[1]);
      const needBuy = sorted.filter(([n]) => !kitNames.has(n));
      const totalBeads = Object.values(colorCount).reduce((s, v) => s + v, 0);

      const summaryEl = document.getElementById('shopping-summary');
      summaryEl.innerHTML = `共 <strong>${sorted.length}</strong> 种颜色，
        总计 <strong>${totalBeads.toLocaleString()}</strong> 颗。
        套装档位：<strong>${KIT_TIERS[tierIndex].label}</strong>。
        ${needBuy.length > 0
          ? `<span style="color:#e65100">⚠ 有 <strong>${needBuy.length}</strong> 种颜色不在当前套装内，需额外购买。</span>`
          : `<span style="color:#2e7d32">✓ 所有颜色均在当前套装内。</span>`}`;

      const tbody = document.getElementById('shopping-tbody');
      tbody.innerHTML = sorted.map(([name, count]) => {
        const c = COLOR_MAP[name];
        const inKit = kitNames.has(name);
        const packs = Math.ceil(count / 1000);
        return `<tr class="${inKit ? '' : 'row-missing'}">
          <td><span class="swatch-sm" style="background:rgb(${c.r},${c.g},${c.b})"></span></td>
          <td><strong>${name}</strong></td>
          <td>${c.zh}</td>
          <td>${count.toLocaleString()}</td>
          <td>${packs} 包（约 ${(packs * 1000).toLocaleString()} 颗）</td>
          <td>${inKit
            ? '<span class="tag-have">套装已有</span>'
            : '<span class="tag-need">需购买</span>'}</td>
        </tr>`;
      }).join('');

      document.getElementById('shopping-section').style.display = 'block';
    }

    // ─── 分色高亮 ────────────────────────────────────────────────────────────────
    function highlightColor(name) {
      if (highlightedColor === name) {
        // 取消高亮
        highlightedColor = null;
        renderGrid(currentGrid, currentGridW, currentGridH, currentCellSize, currentShowLabels);
        document.querySelectorAll('.color-chip').forEach(el => {
          el.classList.remove('chip-active', 'chip-dim');
        });
      } else {
        highlightedColor = name;
        renderGridHighlighted(name);
        document.querySelectorAll('.color-chip').forEach(el => {
          const cn = el.dataset.color;
          el.classList.toggle('chip-active', cn === name);
          el.classList.toggle('chip-dim',   cn !== name);
        });
      }
    }

    function renderGridHighlighted(targetName) {
      const canvas = document.getElementById('grid-canvas');
      const GW = currentGridW, GH = currentGridH, CS = currentCellSize;
      canvas.width = GW * CS; canvas.height = GH * CS;
      const ctx = canvas.getContext('2d');

      for (let y = 0; y < GH; y++) {
        for (let x = 0; x < GW; x++) {
          const c = currentGrid[y][x];
          if (!c) { drawEmptyCell(ctx, x*CS, y*CS, CS); continue; }
          if (c.name === targetName) {
            ctx.fillStyle = `rgb(${c.r},${c.g},${c.b})`;
          } else {
            // 淡化：混入 80% 白色
            const dr = Math.round(c.r * 0.18 + 238 * 0.82);
            const dg = Math.round(c.g * 0.18 + 238 * 0.82);
            const db = Math.round(c.b * 0.18 + 238 * 0.82);
            ctx.fillStyle = `rgb(${dr},${dg},${db})`;
          }
          ctx.fillRect(x*CS, y*CS, CS, CS);
        }
      }
      // 网格线
      ctx.strokeStyle = 'rgba(0,0,0,0.07)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= GW; i++) {
        ctx.beginPath(); ctx.moveTo(i*CS, 0); ctx.lineTo(i*CS, GH*CS); ctx.stroke();
      }
      for (let j = 0; j <= GH; j++) {
        ctx.beginPath(); ctx.moveTo(0, j*CS); ctx.lineTo(GW*CS, j*CS); ctx.stroke();
      }
      // 对目标颜色的格子画色号
      if (currentShowLabels && CS >= 9) {
        const fontSize = Math.max(4, Math.floor(CS * 0.42));
        ctx.font = `bold ${fontSize}px Arial,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        for (let y = 0; y < GH; y++) {
          for (let x = 0; x < GW; x++) {
            const c = currentGrid[y][x];
            if (!c || c.name !== targetName) continue;
            const lum = 0.299*c.r + 0.587*c.g + 0.114*c.b;
            ctx.fillStyle = lum > 148 ? 'rgba(0,0,0,0.62)' : 'rgba(255,255,255,0.82)';
            ctx.fillText(c.name, x*CS + CS/2, y*CS + CS/2);
          }
        }
      }
    }

    // ─── 导出功能 ────────────────────────────────────────────────────────────────
    function exportPNG() {
      const canvas = document.getElementById('grid-canvas');
      const a = document.createElement('a');
      a.download = 'mard-pattern.png';
      a.href = canvas.toDataURL();
      a.click();
    }

      const rows = sorted.map(([name, count]) => {
        const c = COLOR_MAP[name];

        return `<tr style="${inKit ? '' : 'background:#fffbf5'}">
          <td style="padding:5px 10px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:rgb(${c.r},${c.g},${c.b});border:1px solid rgba(0,0,0,0.15);vertical-align:middle;margin-right:5px"></span></td>
